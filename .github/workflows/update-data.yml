name: Refresh public market model

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: refresh-market-model
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q
      - name: Build walk-forward model
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: python src/build_model.py
      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: refresh public market model"
            git push
          fi
